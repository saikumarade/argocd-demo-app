apiVersion: apps/v1
kind: Deployment
metadata:
  name: easyshop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: easyshop
  template:
    metadata:
      labels:
        app: easyshop
    spec:
      containers:
        - name: easyshop
          image: trainwithshubham/easyshop-app:1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
